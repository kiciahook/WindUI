name = "kiciahook/windui"
version = "0.0.0"
license = "MIT"
description = "Unofficial pesde package for WindUI"

includes = ["pesde.toml", "README.md", "LICENSE", "lib/**/*.lua"]

[engines]
pesde = "^0.7.1"
lune = "=0.10.4"

[target]
environment = "roblox"
lib = "lib/Init.lua"
build_files = ["lib"]

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dependencies]
windui_icons = { repo = "kiciahook/windui-icons", rev = "7cdcb6b01a95b1a61c88003dcebf8481c757535a", target = "luau" }

[dev_dependencies]
selene = { name = "pesde/selene", version = "^0.29.0", target = "lune" }
stylua = { name = "pesde/stylua", version = "^2.0.2", target = "lune" }
darklua = { repo = "Stefanuk12/darklua", rev = "a1ac53a49d4c2e44e9bf28e95185e3f14c9892c4", target = "lune" }
luau_defs = { repo = "rocult/luau-defs", rev = "cd5fe1217f180a5b5760104c0a5c308aa2c5d58d", target = "luau" }
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
